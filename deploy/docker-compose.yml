services:
  postgres:
    image: postgres:18-alpine
    container_name: wo_postgres
    environment:
      POSTGRES_USER: workorder
      POSTGRES_PASSWORD: workorder_dev
      POSTGRES_DB: workorder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workorder -d workorder"]
      interval: 5s
      timeout: 5s
      retries: 5

  be:
    build:
      context: ..
      dockerfile: be/Dockerfile
      target: dev
    container_name: wo_be
    environment:
      NODE_ENV: development
      PORT: 3001
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://workorder:workorder_dev@postgres:5432/workorder
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-string-at-least-32-chars}
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      OWNER_EMAIL: ${OWNER_EMAIL:-jacki.ng@ada.asia}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-1q2w3e4r!Q@W#E$$R!!!}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      BOM_WO_SHEET_ID: ${BOM_WO_SHEET_ID:-1MTW18USJHOLCO7jNOLCnmaYPZ5S0Dte53Y5dwDWOJz0}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3001/api/auth/oauth/google/callback}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_PRIVATE_KEY: ${MS_PRIVATE_KEY:-}
      MS_PRIVATE_KEY_FILE: ${MS_PRIVATE_KEY_FILE:-}
      MS_CERTIFICATE: ${MS_CERTIFICATE:-}
      MS_CERTIFICATE_FILE: ${MS_CERTIFICATE_FILE:-}
      MS_CERT_THUMBPRINT: ${MS_CERT_THUMBPRINT:-}
      MS_TENANT: ${MS_TENANT:-common}
      MS_REDIRECT_URI: ${MS_REDIRECT_URI:-http://localhost:3001/api/auth/oauth/microsoft/callback}
      BITRIX_WEBHOOK_URL: ${BITRIX_WEBHOOK_URL:-}
      WORKDIR: /app/be
    ports:
      - "3001:3001"
    volumes:
      - ../:/app
      - be_node_modules:/app/be/node_modules
      - be_root_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/be
    entrypoint: ["/app/deploy/dev-entrypoint.sh"]
    command: ["npm", "run", "dev"]

  fe:
    build:
      context: ..
      dockerfile: fe/Dockerfile
      target: dev
    container_name: wo_fe
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      WORKDIR: /app/fe
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - fe_node_modules:/app/fe/node_modules
      - fe_root_node_modules:/app/node_modules
    depends_on:
      - be
    working_dir: /app/fe
    entrypoint: ["/app/deploy/dev-entrypoint.sh"]
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  be_node_modules:
  be_root_node_modules:
  fe_node_modules:
  fe_root_node_modules:
